name: Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m pytest -q backend/tests -k "not real_api"

      - name: Run syntax checks
        run: |
          python -m py_compile backend/src/*.py
          node --check frontend/app.js

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reminder — sync GitHub vars before deploying
        run: |
          echo "::warning title=Sync GitHub Actions variables::If you edited .github/actions-vars.example, run ./scripts/sync-github-vars.sh locally BEFORE pushing. GitHub Actions reads vars at the start of the run, so unsynced changes won't take effect this deploy."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package lambda bundle
        run: |
          chmod +x scripts/package_lambda.sh
          ./scripts/package_lambda.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update ingestion lambda environment variables
        run: |
          cat > ingestion-env.json <<EOF
          {
            "Variables": {
              "HARVARD_ART_API_KEY": "${{ secrets.HARVARD_ART_API_KEY }}",
              "HARVARD_API_BASE_URL": "${{ vars.HARVARD_API_BASE_URL }}",
              "HARVARD_PAGE_SIZE": "${{ vars.HARVARD_PAGE_SIZE }}",
              "HARVARD_MAX_PAGES": "${{ vars.HARVARD_MAX_PAGES }}",
              "INGESTION_START_PAGE": "${{ vars.INGESTION_START_PAGE }}",
              "TOP_CLASSIFICATION_LIMIT": "${{ vars.TOP_CLASSIFICATION_LIMIT }}",
              "MAX_ITEMS_PER_ERA": "${{ vars.MAX_ITEMS_PER_ERA }}",
              "INCLUDE_UNKNOWN_ERA": "${{ vars.INCLUDE_UNKNOWN_ERA }}",
              "APPEND_MODE": "${{ vars.APPEND_MODE }}",
              "DEDUPE_BY_ID": "${{ vars.DEDUPE_BY_ID }}",
              "RAW_BUCKET": "${{ vars.RAW_BUCKET }}",
              "CURATED_BUCKET": "${{ vars.CURATED_BUCKET }}",
              "RAW_KEY": "${{ vars.RAW_KEY }}",
              "DATASET_KEY": "${{ vars.DATASET_KEY }}",
              "TOPICS_INDEX_KEY": "${{ vars.TOPICS_INDEX_KEY }}",
              "TOPICS_PAGE_PREFIX": "${{ vars.TOPICS_PAGE_PREFIX }}",
              "TOPICS_PAGE_SIZE": "${{ vars.TOPICS_PAGE_SIZE }}",
              "TOPICS_MAX_PAGES": "${{ vars.TOPICS_MAX_PAGES }}",
              "INGESTION_STATE_KEY": "${{ vars.INGESTION_STATE_KEY }}",
              "SNS_TOPIC_ARN": "${{ vars.SNS_TOPIC_ARN }}",
              "LAMBDA_FUNCTION_NAME": "${{ vars.INGESTION_LAMBDA_NAME }}",
              "DATASET_FRESHNESS_MAX_HOURS": "${{ vars.DATASET_FRESHNESS_MAX_HOURS }}"
            }
          }
          EOF
          aws lambda update-function-configuration \
            --function-name "${{ vars.INGESTION_LAMBDA_NAME }}" \
            --environment file://ingestion-env.json

      - name: Update admin lambda environment variables
        run: |
          cat > admin-env.json <<EOF
          {
            "Variables": {
              "ADMIN_TOKEN": "${{ secrets.ADMIN_TOKEN }}",
              "EVENTBRIDGE_RULE_NAME": "${{ vars.EVENTBRIDGE_RULE_NAME }}",
              "INGESTION_LAMBDA_NAME": "${{ vars.INGESTION_LAMBDA_NAME }}",
              "CURATED_BUCKET": "${{ vars.CURATED_BUCKET }}",
              "ADMIN_REFRESH_COOLDOWN_SECONDS": "${{ vars.ADMIN_REFRESH_COOLDOWN_SECONDS }}",
              "ADMIN_STATE_KEY": "${{ vars.ADMIN_STATE_KEY }}"
            }
          }
          EOF
          aws lambda update-function-configuration \
            --function-name "${{ vars.ADMIN_LAMBDA_NAME }}" \
            --environment file://admin-env.json

      - name: Deploy ingestion lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.INGESTION_LAMBDA_NAME }}" \
            --zip-file fileb://build/lambda_bundle.zip

      - name: Deploy admin lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.ADMIN_LAMBDA_NAME }}" \
            --zip-file fileb://build/lambda_bundle.zip

      - name: Render frontend config
        run: |
          cat > frontend/config.js <<EOF
          window.APP_CONFIG = {
            datasetUrl: "${{ vars.FRONTEND_DATASET_URL }}",
            topicsIndexUrl: "${{ vars.FRONTEND_TOPICS_INDEX_URL }}",
            topicsPageUrlTemplate: "${{ vars.FRONTEND_TOPICS_PAGE_URL_TEMPLATE }}",
            adminApiUrl: "${{ vars.ADMIN_API_URL }}"
          };
          EOF

      - name: Setup SSH key for EC2 deploy
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ vars.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure frontend deploy directory exists
        run: |
          ssh "${{ vars.EC2_SSH_USER }}@${{ vars.EC2_HOST }}" \
            "mkdir -p '${{ vars.EC2_FRONTEND_PATH }}'"

      - name: Upload frontend to EC2 path
        run: |
          rsync -az --delete \
            --exclude "dataset.json" \
            frontend/ "${{ vars.EC2_SSH_USER }}@${{ vars.EC2_HOST }}:${{ vars.EC2_FRONTEND_PATH }}/"
